spring:
  application.name: blog-backend
  profiles:
    active: dev
security:
  ignore-urls:
    - /error
    - /favicon.ico
  unsecured-urls:
    - /api/auth/login
    - /api/auth/register
    - /api/auth/email-code
    - /api/auth/email-login
    - /api/auth/refresh
    - /ws/**
    - /api/articles
    - /api/articles/**
    - /api/users/*/follows
    - /api/users/*/fans
    - /api/categories/tree
    - /api/tags
    - /api/comments
    - /doc.html
    - /swagger-ui/**
    - /swagger-resources/**
    - /v3/api-docs/**
    - /webjars/**
  session:
    type: jwt
    access-token-time-to-live: 3600
    refresh-token-time-to-live: 604800
    jwt:
      secret-key: SecretKey012345678901234567890123456789
    redis-token:
      allow-multi-login: true

websocket:
  endpoint: /ws/chat
  allowed-origin-patterns:
    - "*"
  token-query-param: accessToken

chat:
  attachment-processing:
    batch-size: 16
    max-retry-count: 3
    retry-delay-seconds: 30
    lease-seconds: 300
    dispatch-fixed-delay-ms: 15000

thread-pool:
  async:
    # core-pool-size:
    # max-pool-size:
    queue-capacity: 256
    thread-name-prefix: async-task-
    wait-for-tasks-to-complete-on-shutdown: true
    await-termination-seconds: 30
    rejection-policy: caller-runs
  scheduled:
    pool-size: 1
    thread-name-prefix: scheduled-task-
    rejection-policy: caller-runs





