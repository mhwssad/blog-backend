spring:
  application.name: blog-backend
  profiles:
    active: dev
security:
  ignore-urls:
    - /error
    - /favicon.ico
  unsecured-urls:
    - /api/auth/login
    - /api/auth/register
    - /api/auth/email-code
    - /api/auth/email-login
    - /api/auth/refresh
    - /ws/**
    - /api/articles
    - /api/articles/**
    - /api/public/authors/*
    - /api/public/authors/*/series
    - /api/public/article-series/*
    - /api/users/*/follows
    - /api/users/*/fans
    - /api/users/*/author-profile
    - /api/categories/tree
    - /api/tags
    - /api/comments
    - /doc.html
    - /swagger-ui/**
    - /swagger-resources/**
    - /v3/api-docs/**
    - /webjars/**
  session:
    type: jwt
    access-token-time-to-live: 3600
    refresh-token-time-to-live: 604800
    jwt:
      secret-key: SecretKey012345678901234567890123456789
    redis-token:
      allow-multi-login: true

websocket:
  endpoint: /ws/chat
  allowed-origin-patterns:
    - "*"
  token-query-param: accessToken

chat:
  attachment-processing:
    batch-size: 16
    max-retry-count: 3
    retry-delay-seconds: 30
    lease-seconds: 300
    dispatch-fixed-delay-ms: 15000

ai:
  langchain4j:
    enabled: ${AI_LANGCHAIN4J_ENABLED:false}
    provider: ${AI_PROVIDER:deepseek}
    base-url: ${AI_BASE_URL:https://api.deepseek.com/v1}
    api-key: ${AI_API_KEY:}
    model-name: ${AI_MODEL_NAME:deepseek-chat}
    chat:
      temperature: ${AI_TEMPERATURE:0.7}
      top-p: ${AI_TOP_P:}
      max-tokens: ${AI_MAX_TOKENS:2048}
      timeout: ${AI_TIMEOUT:60s}
      max-retries: ${AI_MAX_RETRIES:1}
      log-requests: ${AI_LOG_REQUESTS:false}
      log-responses: ${AI_LOG_RESPONSES:false}

thread-pool:
  async:
    # core-pool-size:
    # max-pool-size:
    queue-capacity: 256
    thread-name-prefix: async-task-
    wait-for-tasks-to-complete-on-shutdown: true
    await-termination-seconds: 30
    rejection-policy: caller-runs
  scheduled:
    pool-size: 1
    thread-name-prefix: scheduled-task-
    rejection-policy: caller-runs





