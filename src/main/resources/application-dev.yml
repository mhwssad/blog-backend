server:
  port: 8080

spring:
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver # 3.2.0开始支持SPI可省略此配置
    url: jdbc:mysql://localhost:3306/blog_backend?zeroDateTimeBehavior=convertToNull&useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&autoReconnect=true&allowMultiQueries=true
    username: root
    password: 123456

  data:
    redis:
      database: 12
      host: localhost
      port: 6379
      password: 123456
      timeout: 10s
      lettuce:
        pool:
          # 连接池最大连接数 默认8 ，负数表示没有限制
          max-active: 8
          # 连接池最大阻塞等待时间（使用负值表示没有限制） 默认-1
          max-wait: -1
          # 连接池中的最大空闲连接 默认8
          max-idle: 8
          # 连接池中的最小空闲连接 默认0
          min-idle: 0
  cache:
    enabled: false
    # 缓存类型 redis、none(不使用缓存)
    type: redis
    # 缓存时间(单位：ms)
    redis:
      time-to-live: 3600000
      # 缓存null值，防止缓存穿透
      cache-null-values: true
    caffeine:
      spec: initialCapacity=50,maximumSize=1000,expireAfterWrite=600s
  # 邮件配置
  mail:
    host: smtp.youlai.tech
    port: 587
    username: your-email@example.com
    password: 123456
    properties:
      smtp:
        auth: true
        starttls:
          enable: true
    # 邮件发送者
    from: youlaitech@163.com

storage:
  storage-type: local
  storage:
    - key: local-default
      type: local
      base-url:
      bucket-name: target/storage
  manager:
    strategy: DEFAULT
    enable-health-check: false
    enable-load-balancing: false

file-upload:
  chunk-size: 5242880
  chunk-size-threshold: 6291456
  task-expire-days: 2
  max-file-size: 104857600
  temp-dir-prefix: temp
  enable-md5-check: true

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  global-config:
    db-config:
      # 主键ID类型
      id-type: none
      # 逻辑删除对应的全局属性名（注意：须是对象属性名，不能是表字段名，如 isDeleted 而非 is_deleted，否则逻辑删除失效）
      logic-delete-field: isDeleted
      # 逻辑删除-删除值
      logic-delete-value: 1
      # 逻辑删除-未删除值
      logic-not-delete-value: 0
  configuration:
    # 驼峰下划线转换
    map-underscore-to-camel-case: true

# springdoc 配置文档: https://springdoc.org/properties.html
springdoc:
  swagger-ui:
    path: /swagger-ui.html # Swagger UI 访问路径
    operationsSorter: alpha # 接口按方法名排序
    tags-sorter: alpha # 标签按字母排序
  api-docs:
    path: /v3/api-docs # OpenAPI JSON 地址
  group-configs: # 分组配置
    - group: "系统管理" # 分组名称
      paths-to-match: "/**" # 匹配的请求路径
      packages-to-scan: # 扫描的 Controller 包，限制只生成指定包的接口文档
        - com.cybzacg.blogbackend.module
  default-flat-param-object: true # 将对象参数扁平化显示在文档中

# knife4j 配置
knife4j:
  enable: true # 是否启用 Knife4j 增强功能
  production: false # 是否启用生产环境保护（true=生产环境隐藏文档，false=开发环境可访问）
  setting:
    language: zh_cn

# Actuator 端点配置（监控端点暴露）
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,env,loggers,heapdump,threaddump
  endpoint:
    health:
      show-details: always
