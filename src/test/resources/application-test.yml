spring:
  autoconfigure:
    exclude:
      - org.redisson.spring.starter.RedissonAutoConfigurationV2
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:blog_backend;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE
    username: sa
    password:
  data:
    redis:
      host: localhost
      port: 6379
      database: 15
      timeout: 1s
      repositories:
        enabled: false
  cache:
    type: none
  mail:
    host: localhost
    port: 25
    username: test@example.com
    password: test
    from: test@example.com

security:
  session:
    type: jwt
    access-token-time-to-live: 3600
    refresh-token-time-to-live: 604800
    jwt:
      secret-key: SecretKey012345678901234567890123456789

storage:
  storage-type: local
  storage:
    - key: local-test
      type: local
      base-url:
      bucket-name: target/test-storage
  manager:
    strategy: DEFAULT
    enable-health-check: false
    enable-load-balancing: false

file-upload:
  chunk-size: 5242880
  chunk-size-threshold: 6291456
  task-expire-days: 2
  max-file-size: 104857600
  temp-dir-prefix: temp-test
  enable-md5-check: true

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  global-config:
    db-config:
      id-type: none
      logic-delete-field: isDeleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs
  default-flat-param-object: true

knife4j:
  enable: false
  production: true
